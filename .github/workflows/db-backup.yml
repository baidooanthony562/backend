name: Weekly MongoDB backup

on:
  # Every Sunday at 02:00 UTC (= 02:00 Africa/Accra). Off-hours so the
  # snapshot doesn't compete with live traffic for connection slots.
  schedule:
    - cron: '0 2 * * 0'
  # Lets you trigger a fresh backup on demand from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install mongodb-database-tools
        run: |
          set -euo pipefail
          # Use the official MongoDB binary tarball — avoids Docker volume
          # permission issues we hit with the mongo:7 image, and the tools
          # are not preinstalled on the GitHub runner.
          TOOLS_VERSION=100.11.0
          curl -fsSL "https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-${TOOLS_VERSION}.tgz" -o /tmp/mtools.tgz
          tar -xzf /tmp/mtools.tgz -C /tmp
          sudo cp /tmp/mongodb-database-tools-*/bin/mongodump /usr/local/bin/
          mongodump --version

      - name: Run mongodump
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          set -euo pipefail
          if [ -z "${MONGO_URI:-}" ]; then
            echo "::error::MONGO_URI secret is not set on this repo. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p backup
          mongodump --uri="$MONGO_URI" --out=backup --gzip
          ls -lah backup

      - name: Archive dump
        id: archive
        run: |
          set -euo pipefail
          STAMP=$(date -u +'%Y-%m-%d')
          tar -czf "mongo-backup-${STAMP}.tar.gz" -C backup .
          ls -lah "mongo-backup-${STAMP}.tar.gz"
          # Step output (vs env) so the upload step can reference it without
          # tripping the editor's "context access might be invalid" warning.
          echo "stamp=${STAMP}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Retained for 90 days (free-tier max). Download from the Actions
          # run summary if you need to mongorestore.
          name: mongo-backup-${{ steps.archive.outputs.stamp }}
          path: mongo-backup-${{ steps.archive.outputs.stamp }}.tar.gz
          retention-days: 90
          if-no-files-found: error
